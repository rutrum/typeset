name = "typeset"
description = "A LaTeX/typst-inspired academic paper theme for Zola blogs"
license = "MIT"
version = "0.3.0"
homepage = "https://github.com/rutrum/typeset"
min_version = "0.18.0"
demo = ""

[author]
name = "rutrum"
homepage = "https://rutrum.net"

[extra]
# ==========================================================================
# Color Customization
# ==========================================================================
# Two main colors define your theme's appearance:
#   - accent_color: Used for highlights, active states, hover effects
#   - link_color: Used for hyperlinks
#
# Add _dark suffix for dark mode variants (e.g., accent_color_dark)
# If dark variants aren't set, light mode colors are used in both modes.

# Light mode
accent_color = ""           # Default: #b8860b (academic gold)
link_color = ""             # Default: #2563eb (blue)

# Dark mode (optional)
accent_color_dark = ""      # Default: #d4a84b (brighter gold)
link_color_dark = ""        # Default: #60a5fa (lighter blue)

# Additional overrides
background_color = ""       # Default: #fffff8 (warm off-white)
text_color = ""             # Default: #111111 (near black)

# Typography (Google Fonts names or font stacks)
font_body = ""         # Default: "Crimson Pro", Georgia, serif
font_heading = ""      # Default: "Inter", system-ui, sans-serif
font_mono = ""         # Default: "JetBrains Mono", monospace

# Features
show_toc = true        # Show table of contents on pages
toc_depth = 3          # Max heading depth for TOC (1-6)
math_everywhere = false # Load KaTeX on all pages (false = per-page opt-in)

# Navigation links (displayed in header)
# Example: nav_links = [{ name = "Blog", url = "/blog" }, { name = "About", url = "/about" }]
nav_links = []

# Footer links (external links with optional Lucide icons)
# Example:
# [[extra.footer_links]]
# text = "GitHub"
# url = "https://github.com/username"
# icon = "github"  # Lucide icon name (optional)
#
# [[extra.footer_links]]
# text = "Twitter"
# url = "https://twitter.com/username"
# icon = "twitter"

# Taxonomies (copy to your config.toml)
# taxonomies = [
#     { name = "tags", feed = true },
#     { name = "categories", feed = false },
# ]
